# .github/workflows/v3_pipeline.yml
name: SafeWallet V3 Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  # Global environment variables
  NODE_VERSION: '22'
  SNYK_SEVERITY: 'high'

jobs:
  # ==========================================================================
  # Job 1: SAST & Dependency Scanning
  # ==========================================================================
  sast-scan:
    name: Security Scanning (Snyk)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Install dependencies with legacy peer deps to handle React 19 conflicts
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts || npm install --legacy-peer-deps --ignore-scripts

      # Debug: Verify token
      - name: Verify Snyk Token
        id: check-token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN is not configured in secrets!"
            exit 1
          fi
          echo "✓ SNYK_TOKEN is present"
          echo "token-set=true" >> $GITHUB_OUTPUT
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Install Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      # Authenticate Snyk with enhanced error handling
      - name: Authenticate Snyk
        id: snyk-auth
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN is missing! Please configure it in Repository Secrets."
            exit 1
          fi
          echo "Authenticating Snyk..."
          snyk auth ${{ secrets.SNYK_TOKEN }} || { echo "::error::Authentication failed (401/403)"; exit 1; }
          
          # Test if authentication is actually working
          snyk auth --check || { echo "::error::Snyk auth check failed"; exit 1; }
          echo "✓ Authentication verified successfully"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Snyk Open Source (npm dependencies)
      - name: Run Snyk Open Source Scan
        id: snyk-os
        run: |
          echo "Running Snyk Open Source scan..."
          # Create an initial valid empty SARIF to ensure the file always exists
          cat > snyk-os.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Snyk Open Source",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
          
          # Run Snyk and redirect output to the file
          snyk test \
            --severity-threshold=${{ env.SNYK_SEVERITY }} \
            --sarif-file-output=snyk-os.sarif \
            --org=${{ secrets.SNYK_ORG_ID }} || true
          
          # Final validation
          if [ ! -s snyk-os.sarif ] || ! grep -q "\"version\": \"2.1.0\"" snyk-os.sarif; then
             echo "::warning::snyk-os.sarif is invalid after scan, resetting to empty valid SARIF"
             # (Repeat fallback creation if necessary, but it should already be there from the start)
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Snyk Code (SAST - Static Analysis)
      - name: Run Snyk Code Scan
        id: snyk-code
        run: |
          echo "Checking if Snyk Code is enabled..."
          # Pre-create valid empty SARIF
          cat > snyk-code.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Snyk Code",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
          
          # Attempt to run Snyk Code, handle 403 Forbidden gracefully
          if snyk code test --severity-threshold=${{ env.SNYK_SEVERITY }} --sarif-file-output=snyk-code.sarif --org=${{ secrets.SNYK_ORG_ID }}; then
            echo "✓ Snyk Code scan completed successfully"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ]; then
              echo "::warning::Snyk Code is not enabled for your organization. Please enable it in the Snyk Dashboard (Settings > Snyk Code)."
            else
              echo "Snyk Code scan completed with findings (Exit Code: $EXIT_CODE)"
            fi
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Upload results to GitHub Security tab
      - name: Upload Snyk OS Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-os.sarif
          category: snyk-os
        if: always() && steps.check-token.outputs.token-set == 'true'

      - name: Upload Snyk Code Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
        if: always() && steps.check-token.outputs.token-set == 'true'
  
  # ==========================================================================
  # Job 2: Build & Test
  # ==========================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: sast-scan
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: NestJS Build & Test (v3/gateway-nest)
        run: |
          cd v3/gateway-nest
          npm install --legacy-peer-deps
          npm test -- --coverage --threshold=90
      
      - name: Rust Build & Test (v3/security-rust)
        run: |
          if [ -d "v3/security-rust" ]; then
            cd v3/security-rust
            cargo test
          else
            echo "v3/security-rust not found, skipping..."
          fi
      
      - name: Python Build & Test (v3/worker-python)
        run: |
          if [ -d "v3/worker-python" ]; then
            cd v3/worker-python
            pip install -r requirements.txt
            python -m unittest discover test/
          else
            echo "v3/worker-python not found, skipping..."
          fi
  
  # ==========================================================================
  # Job 3: Container Scanning
  # ==========================================================================
  container-scan:
    name: Container Security
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: |
          docker build -t safewallet/gateway-nest:v3 ./v3/gateway-nest
      
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'safewallet/gateway-nest:v3'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
      
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
  
  # ==========================================================================
  # Job 4: Deploy to Staging
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: container-scan
    environment: staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          if [ -d "v3/gateway-nest/k8s" ]; then
            kubectl apply -f v3/gateway-nest/k8s/ --dry-run=client
          else
            echo "K8s manifests not found, skipping..."
          fi
  
  # ==========================================================================
  # Job 5: Deploy to Production
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    needs: container-scan
    environment: production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          if [ -d "v3/gateway-nest/k8s" ]; then
            kubectl apply -f v3/gateway-nest/k8s/ --dry-run=client
          else
            echo "K8s manifests not found, skipping..."
          fi
          
          # Post-deployment validation
          chmod +x ./v3/scripts/validate_deployment.sh
          ./v3/scripts/validate_deployment.sh