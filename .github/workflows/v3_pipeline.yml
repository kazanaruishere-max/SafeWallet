# .github/workflows/v3_pipeline.yml
name: SafeWallet V3 Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '22'
  SNYK_SEVERITY: 'high'

jobs:
  sast-scan:
    name: Security Scanning (Snyk)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify Snyk Token
        id: check-token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::warning::SNYK_TOKEN is not configured in secrets! Snyk scans will be skipped."
            echo "token-set=false" >> $GITHUB_OUTPUT
          else
            echo "✓ SNYK_TOKEN is present"
            echo "token-set=true" >> $GITHUB_OUTPUT
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Install Snyk CLI
        if: steps.check-token.outputs.token-set == 'true'
        run: npm install -g snyk@latest

      - name: Authenticate Snyk
        if: steps.check-token.outputs.token-set == 'true'
        id: snyk-auth
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk auth --check
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Open Source Scan
        if: steps.check-token.outputs.token-set == 'true'
        run: |
          cat > snyk-os.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [ { "tool": { "driver": { "name": "Snyk Open Source", "rules": [] } }, "results": [] } ]
          }
          EOF
          snyk test --severity-threshold=${{ env.SNYK_SEVERITY }} --sarif-file-output=snyk-os.sarif --org=${{ secrets.SNYK_ORG_ID }} || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code Scan
        if: steps.check-token.outputs.token-set == 'true'
        run: |
          cat > snyk-code.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [ { "tool": { "driver": { "name": "Snyk Code", "rules": [] } }, "results": [] } ]
          }
          EOF
          if snyk code test --severity-threshold=${{ env.SNYK_SEVERITY }} --sarif-file-output=snyk-code.sarif --org=${{ secrets.SNYK_ORG_ID }}; then
            echo "✓ Snyk Code scan completed successfully"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ]; then
              echo "::warning::Snyk Code is not enabled for your organization."
            fi
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk Results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check-token.outputs.token-set == 'true'
        with:
          sarif_file: snyk-os.sarif
          category: snyk-os

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: NestJS Build & Test
        run: |
          cd v3/gateway-nest
          npm install --legacy-peer-deps
          npm test -- --coverage
      - name: Rust Build & Test
        run: |
          if [ -d "v3/security-rust" ]; then
            cd v3/security-rust
            cargo test
          fi
      - name: Python Build & Test
        run: |
          if [ -d "v3/worker-python" ]; then
            cd v3/worker-python
            pip install -r requirements.txt
            python -m unittest discover .
          fi

  container-scan:
    name: Container Security
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t safewallet-gateway:latest v3/gateway-nest/

  deploy-production:
    name: Deploy to Production
    needs: container-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Deploying to production..."
          chmod +x ./v3/scripts/validate_deployment.sh
          ./v3/scripts/validate_deployment.sh
